<!DOCTYPE html>
<html>
    <head>
        <title>BudgetInt Dashboard</title>
        <!--css-->
        <style>
        /*toggle bar */
        </style>
    </head>
    <body>
        <h1>BudgetInt Dashboard</h1>
        <h3>Current Balance: {{ balance }}€</h3>

        <form action="/add" method="POST">
            <div>
                <input type="radio" id="expense" name="tx_type" value="Expense" checked>
                <label for="expense" class="toggle-item">Expense</label>
                <input type="radio" id="income" name="tx_type" value="Income" checked>
                <label for="income" class="toggle-item">Income</label>
            </div>

            <label>Category:</label><br>

            <div id="expense-categories" style="display: none;">
                <select name="categ_name_expense">
                    <option value="Food">Food</option>
                    <option value="Drinks">Drinks</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Bills">Bills</option>
                </select>
            </div>

            <div id="income-categories">
                <select name="categ_name_income">
                    <option value="Salary">Salary</option>
                    <option value="Gift">Gift</option>
                    <option value="Bonus">Bonus</option>
                </select>
            </div>

            <label for="item_name">Item:</label><br>
            <input type="text" id="item_name" name="item_name" placeholder="e.g. Burger" required><br>

            <label for="tx_amount">Amount:</label><br>
            <input type="number" id="tx_amount" name="amount_val" step="0.01" required><br>
            
            <button type="submit" style="margin-bottom: 15px;">Save Transaction</button><br>
        </form>

        <div style="margin-bottom: 20px;">
            <a href="{{ url_for('handle_clear') }}" 
            onclick="return confirm('EXTREME WARNING: This will delete your entire history. Proceed?')"
            style="color: white; background-color: #ff4d4d; padding: 8px 15px; text-decoration: none; border-radius: 4px; font-weight: bold;">
            Reset All Data
            </a>
        </div>


        <table border="1">
            <thead>
                <tr>
                    <th>Category</th>
                    <th>item</th>
                    <th>Amount</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for tx in trans_list %}
                <tr>
                    <td>{{ tx.category }}</td>
                    <td>{{tx.item}}</td>
                    <td>{{ tx.amount }}€</td>
                    <td>{{ tx.date }}</td>
                    <td>
                        <a href="{{url_for('handle_delete', transaction_id=tx.id) }}"
                        onclick="return confirm('Delete this transaction?')">
                        Delete
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <script>
            const expenseRadio = document.getElementById('expense')
            const incomeRadio = document.getElementById('income')
            const expenseDiv = document.getElementById('expense-categories')
            const incomeDiv = document.getElementById('income-categories')

            function toggle_categories() {
                if (expenseRadio.checked) {
                    expenseDiv.style.display = "block";
                    incomeDiv.style.display = "none";
                } else {
                    expenseDiv.style.display = "none";
                    incomeDiv.style.display = "block";
                }
            }

            expenseRadio.addEventListener('change', toggle_categories);
            incomeRadio.addEventListener('change', toggle_categories);
            toggle_categories();
        </script>
    </body>
</html>
